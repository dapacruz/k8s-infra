apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app.kubernetes.io/name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: plex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plex
    spec:
      serviceAccountName: plex
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: plex
        image: lscr.io/linuxserver/plex:1.43.1@sha256:c5e295f023b4e92b3ca467626dbc2ba8a9b5e53934810df74d99c14e38ae1857
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          readOnlyRootFilesystem: false
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /
            port: 32400
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 32400
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        ports:
        - name: http
          containerPort: 32400
          protocol: TCP
        - name: dlna
          containerPort: 1900
          protocol: UDP
        - name: bonjour
          containerPort: 5353
          protocol: UDP
        - name: companion
          containerPort: 8324
          protocol: TCP
        - name: gdm
          containerPort: 32410
          protocol: UDP
        - name: gdm2
          containerPort: 32412
          protocol: UDP
        - name: gdm3
          containerPort: 32413
          protocol: UDP
        - name: gdm4
          containerPort: 32414
          protocol: UDP
        - name: dlna2
          containerPort: 32469
          protocol: TCP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/Los_Angeles"
        - name: ADVERTISE_IP
          value: "http://172.31.1.249:32400"
        - name: ALLOWED_NETWORKS
          value: "172.31.1.0/24"
        - name: VERSION
          value: "docker"
        - name: PLEX_CLAIM
          value: "claim-WFo4N1H3UPtVhCCvqc_2"
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: config
        - name: transcode
          mountPath: /transcode
        - name: quicksync
          mountPath: /dev/dri
        - name: media
          mountPath: /tv
          subPath: TV
        - name: media
          mountPath: /movies
          subPath: Movies
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: plex-config-claim
      - name: transcode
        persistentVolumeClaim:
          claimName: plex-transcode-claim
      - hostPath:
          path: /dev/dri
          type: ""
        name: quicksync
      - name: media
        nfs:
          server: nas.cruznet.io
          path: /volume1/Media
          readOnly: false

