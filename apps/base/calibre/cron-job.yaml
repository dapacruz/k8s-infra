apiVersion: batch/v1
kind: CronJob
metadata:
  name: calibre-daily-backup
  namespace: calibre
spec:
  schedule: "0 3 * * *"
  timeZone: "US/Pacific"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rsync-backup
              image: alpine:3.24@sha256:a2d49ea686c2adfe3c992e47dc3b5e7fa6e6b5055609400dc2acaeb241c829f4
              command: ["/bin/sh"]
              args:
                - "-c"
                - |
                  INCLUDE_DIRS="David Jen Alyssa"
                  apk add --no-cache rsync
                  for dir in $INCLUDE_DIRS; do
                    includes="$includes --include=$dir/***"
                  done
                  rsync -av --delete --no-perms --no-owner --no-group \
                    $includes --exclude='*' \
                    /calibre-library/ /nas-backup/
              volumeMounts:
                - name: calibre-lib
                  mountPath: /calibre-library
                  subPath: config
                - name: media
                  mountPath: /nas-backup
                  subPath: eBooks
          volumes:
            - name: calibre-lib
              persistentVolumeClaim:
                claimName: calibre-claim
            - name: media
              nfs:
                server: nas.cruznet.io
                path: /volume1/Media
                readOnly: false

