apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-pre-puller
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: image-pre-puller
  template:
    metadata:
      labels:
        app: image-pre-puller
    spec:
      initContainers:
        - name: pull-plex
          image: lscr.io/linuxserver/plex:1.43.1@sha256:11e99f0bc8844470733a351cf2b4e454f7bfa37c7f38b43846d465906fea360b
          command: ["sh", "-c", "echo pulled Plex"]
        - name: pull-seerr
          image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
          command: ["sh", "-c", "echo pulled Seerr"]
        - name: pull-audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.35.1@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
          command: ["sh", "-c", "echo pulled Audiobookshelf"]
        - name: pull-uptime-kuma
          image: louislam/uptime-kuma:2.4.0@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
          command: ["sh", "-c", "echo pulled Uptime Kuma"]
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10@sha256:ee6521f290b2168b6e0935a181d4cff9be1ac3f505666ef0e3c98fae8199917a
          resources:
            requests:
              cpu: 1m
              memory: 4Mi

