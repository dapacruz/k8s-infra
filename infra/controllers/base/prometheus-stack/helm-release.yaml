apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 84.5.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-stack
        namespace: prometheus-stack
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
    - paths:
      - /metadata/annotations/prometheus-operator-validated
      target:
        kind: PrometheusRule
  valuesFrom:
  - kind: ConfigMap
    name: prometheus-stack-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: prometheus-stack-grafana
            patch: |
              - op: replace
                path: /spec/volumeClaimTemplates/0/metadata/labels
                value:
                  recurring-job.longhorn.io/source: "enabled"
                  recurring-job.longhorn.io/backup-daily-with-weekly-full: "enabled"

