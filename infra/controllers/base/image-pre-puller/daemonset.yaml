apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-pre-puller
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: image-pre-puller
  template:
    metadata:
      labels:
        app: image-pre-puller
    spec:
      initContainers:
        - name: pull-plex
          image: lscr.io/linuxserver/plex:1.43.1@sha256:b785bdd60e781662f16e0526a6b54c07856739df95ab558a674a3c084dbde423
          command: ["sh", "-c", "echo pulled Plex"]
        - name: pull-seerr
          image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
          command: ["sh", "-c", "echo pulled Seerr"]
        - name: pull-audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.34.0@sha256:4143292c530f6ac6700afd13360c04f477e4f1a81c1c97c4224b1c7e4330c5c4
          command: ["sh", "-c", "echo pulled Audiobookshelf"]
        - name: pull-uptime-kuma
          image: louislam/uptime-kuma:2.3.2@sha256:9aeb4e51d038047f414309c77a1af553281ca535723cb88907d907269d0a908e
          command: ["sh", "-c", "echo pulled Uptime Kuma"]
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10@sha256:ee6521f290b2168b6e0935a181d4cff9be1ac3f505666ef0e3c98fae8199917a
          resources:
            requests:
              cpu: 1m
              memory: 4Mi

